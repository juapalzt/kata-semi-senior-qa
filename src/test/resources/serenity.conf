# Serenity configuration for the kata-semi-senior-qa framework
# Adapt values for your environment and CI pipeline.

serenity {
  project {
    name = "kata-semi-senior-qa"
  }

  outputDirectory = "target/site/serenity"
  requirements.dir = "src/test/resources/features"
  tags = "@ui or @api or @e2e"
  report.name = "Serenity Automation Report"
  report.show.step.details = true
  report.show.features = true
  driver = "chrome"
  take.screenshots = "AFTER_EACH_STEP"
  step.details = true
  rest.assured = true
}

webdriver {
  driver = "chrome"
  base.url = "http://localhost:8080"

  chrome {
    switches = ["--disable-gpu", "--window-size=1920,1080", "--no-sandbox", "--disable-dev-shm-usage"]
  }
}

cucumber {
  features = ["src/test/resources/features"]
  glue = ["org.example.tests.stepdefinitions"]
  plugin = ["pretty", "html:target/cucumber-reports.html"]
}

rest-assured {
  base.uri = "http://localhost:8080/api"
  base.path = "/"
  port = 8080
  default.parser = "JSON"
}

environments {
  dev {
    webdriver {
      base.url = "http://localhost:8080"
    }
    rest-assured {
      base.uri = "http://localhost:8080/api"
      port = 8080
    }
  }
  qa {
    webdriver {
      base.url = "https://qa.example.com"
    }
    rest-assured {
      base.uri = "https://qa.example.com/api"
      port = 443
    }
  }
}

serenity.session.timeout = 30
serenity.timeout = 30
serenity.implicit.wait = 5
serenity.wait.for.timeout = 30
