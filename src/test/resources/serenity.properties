# ============================================================
# Serenity BDD Configuration
# ============================================================

# WebDriver Configuration
webdriver.driver=chrome
webdriver.chrome.driver=C:/chromedriver/chromedriver.exe
webdriver.timeouts.implicitly.wait=5000
webdriver.timeouts.fluentwait=5000

# Browser Display Configuration
serenity.browser.height=1024
serenity.browser.width=1280
serenity.logging=verbose

# Screenshot Configuration
serenity.take.screenshots=FOR_FAILURES
serenity.screenshot.quality=50

# Test Environment
serenity.environment=dev

# Headless Mode (set to true to run without browser UI)
serenity.headless=true

# ============================================================
# Report Organization - Evidence Management
# ============================================================

# Base output directory for reports
serenity.outputDirectory=target/serenity-reports

# Enable rich formatting in reports
serenity.rich.formatting=true

# Logging level
serenity.logging=quiet

# Tag configuration for report filtering
serenity.report.tags=@ui,@api,@e2e,@smoke,@regression

# Store HTML source for debugging
serenity.store.html.source=false

# Directory for organized evidence/screenshots
evidence.directory=target/serenity-reports/evidences

# Compress file names (disabled for better readability)
serenity.compress.filenames=false

# Test root package
serenity.test.root=org.example.tests

# Report generation settings
serenity.report.show.pie.charts=true
serenity.report.show.test.details=true
serenity.report.encoding=UTF-8
